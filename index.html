
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>121 Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Utility to hide scrollbars but keep functionality */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<script>
    // Prevent crashes in environments where process is not defined
    window.process = window.process || { env: {} };
    window.global = window;
    
    // Fix for "Cannot set property fetch of #<Window> which has only a getter"
    // Some libraries try to polyfill fetch by assigning to window.fetch.
    // If it's a getter-only property, we try to redefine it to be writable.
    try {
        const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (descriptor && !descriptor.writable && descriptor.configurable) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
                value: originalFetch,
                writable: true,
                configurable: true,
                enumerable: true
            });
        }
    } catch (e) {
        console.warn('Note: fetch property is read-only and could not be redefined.');
    }
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
