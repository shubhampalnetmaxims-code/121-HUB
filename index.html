
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>121 Platform</title>
    <script>
        // CRITICAL: Aggressive fix for "Cannot set property fetch of #<Window> which has only a getter"
        // This must run before any other scripts or modules.
        (function() {
            try {
                const originalFetch = window.fetch;
                
                // 1. Try to delete the property. If it's configurable, this is the cleanest way.
                try {
                    delete window.fetch;
                } catch (e) {}

                // 2. Define it with a getter and setter to allow libraries to override it
                Object.defineProperty(window, 'fetch', {
                    get: function() {
                        return this.__fetch_override__ || originalFetch;
                    },
                    set: function(v) {
                        this.__fetch_override__ = v;
                    },
                    configurable: true,
                    enumerable: true
                });
                
                // 3. Also try to apply to Window.prototype just in case
                if (window.Window && window.Window.prototype) {
                    try {
                        Object.defineProperty(window.Window.prototype, 'fetch', {
                            get: function() {
                                return window.__fetch_override__ || originalFetch;
                            },
                            set: function(v) {
                                window.__fetch_override__ = v;
                            },
                            configurable: true,
                            enumerable: true
                        });
                    } catch (e) {}
                }
            } catch (e) {
                console.warn('Note: fetch property could not be fully redefined.', e);
            }
        })();

        // Prevent crashes in environments where process is not defined
        window.process = window.process || { env: {} };
        window.global = window;
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
